<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Onde Meccaniche - Gratta e Vinci</title>
    <style>
        :root {
            --primary: #3498db;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        h1 { color: #2c3e50; text-align: center; }

        .question-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 25px;
            color: #34495e;
        }

        .option-row {
            display: flex;
            align-items: stretch;
            margin-bottom: 15px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
            background: white;
        }

        .visible-option {
            flex: 1;
            padding: 15px;
            display: flex;
            align-items: center;
            font-size: 1.1em;
            font-weight: bold;
            color: #2c3e50;
            border-right: 2px solid #ecf0f1;
        }

        .scratch-wrapper {
            flex: 1.5; 
            position: relative;
            min-height: 80px;
            background: #fff;
        }

        .feedback-content {
            padding: 15px;
            display: flex;
            align-items: center;
            height: 100%;
            box-sizing: border-box;
            font-weight: 500;
            line-height: 1.4;
            opacity: 0;
        }

        .correct { background-color: #d4edda; color: #155724; }
        .wrong { background-color: #f8d7da; color: #721c24; }

        .scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            touch-action: none;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
        }

        button:hover { background: #2980b9; }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        
        #pageInfo { font-weight: bold; font-size: 1.1em; color: #7f8c8d; }

        @media (max-width: 600px) {
            .option-row { flex-direction: column; }
            .visible-option { border-right: none; border-bottom: 2px solid #ecf0f1; }
            .scratch-wrapper { min-height: 100px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎯 Fisica: Onde Meccaniche</h1>
    <div id="quiz-container"></div>
    
    <div class="nav">
        <button id="prevBtn" onclick="changePage(-1)">⬅️ Precedente</button>
        <span id="pageInfo"></span>
        <button id="nextBtn" onclick="changePage(1)">Successiva ➡️</button>
    </div>
</div>

<script>
    // ==========================================
    // 1. DATABASE DOMANDE E RISPOSTE
    // ==========================================
    // Istruzioni: 
    // - Puoi aggiungere quante domande vuoi copiando il blocco tra le graffe { ... }.
    // - Puoi mettere 2, 3, 4 o quante risposte vuoi per ogni domanda.
    // - IMPORTANTE: Per far capire al sistema qual è la risposta esatta, 
    //   il feedback DEVE iniziare esattamente con la parola "Corretto!"
    // ==========================================
    
    const DATABASE_DOMANDE = [
        {
            domanda: "Cosa trasporta un'onda meccanica lungo la sua direzione di propagazione?",
            risposte: [
                { 
                    visibile: "A) Solo energia", 
                    feedback: "Corretto!" 
                },
                { 
                    visibile: "B) Materia ed energia", 
                    feedback: "Errato!" 
                },
                { 
                    visibile: "C) Solo materia", 
                    feedback: "Errato!" 
                },
                { 
                    visibile: "D) Nessuna delle precedenti", 
                    feedback: "Errato!" 
                }
            ]
        },
        {
            domanda: "Se aumenti l'ampiezza di un'onda meccanica, cosa succede alla sua velocità?",
            risposte: [
                { 
                    visibile: "A) Aumenta", 
                    feedback: "Errato!" 
                },
                { 
                    visibile: "B) Diminuisce", 
                    feedback: "Errato!" 
                },
                { 
                    visibile: "C) Rimane invariata", 
                    feedback: "Corretto!" 
                }
            ]
        },
        {
            domanda: "Due onde si incontrano su una corda. Cosa succede dopo essersi incrociate?",
            risposte: [
                { 
                    visibile: "A) Rimbalzano indietro", 
                    feedback: "Errato!" 
                },
                { 
                    visibile: "B) Proseguono inalterate", 
                    feedback: "Corretto!" 
                },
                { 
                    visibile: "C) Si fermano annullandosi", 
                    feedback: "Errato!" 
                }
            ]
        }

    ];

    // Inizializza lo stato "grattato" per ogni risposta
    DATABASE_DOMANDE.forEach(d => d.risposte.forEach(r => r.grattato = false));

    // ==========================================
    // 2. MOTORE DEL QUIZ (Non c'è bisogno di modificare qui)
    // ==========================================
    let paginaCorrente = 0;

    function renderQuestion() {
        const quizContainer = document.getElementById('quiz-container');
        const d = DATABASE_DOMANDE[paginaCorrente];
        
        quizContainer.innerHTML = `
            <div class="question-card">
                <div class="question-text">${paginaCorrente + 1}. ${d.domanda}</div>
                <div id="options-list"></div>
            </div>
        `;

        const optionsList = document.getElementById('options-list');
        
        d.risposte.forEach((opt, index) => {
            const row = document.createElement('div');
            row.className = 'option-row';
            
            // Il sistema controlla se il feedback inizia con "Corretto!"
            const isCorrect = opt.feedback.trim().startsWith("Corretto!");
            
            // Assegna il colore verde o rosso di conseguenza
            const resultClass = isCorrect ? 'correct' : 'wrong';
            // Aggiunge un'icona testuale in base al risultato
            const icon = isCorrect ? '🏆 ' : '❌ ';
            
            row.innerHTML = `
                <div class="visible-option">${opt.visibile}</div>
                <div class="scratch-wrapper">
                    <div id="feedback-${index}" class="feedback-content ${resultClass}">${icon}${opt.feedback}</div>
                    <canvas class="scratch-canvas" id="canvas-${index}"></canvas>
                </div>
            `;
            
            optionsList.appendChild(row);
            
            setTimeout(() => initScratch(index, opt), 50);
        });

        document.getElementById('pageInfo').innerText = `Domanda ${paginaCorrente + 1} di ${DATABASE_DOMANDE.length}`;
        document.getElementById('prevBtn').disabled = paginaCorrente === 0;
        document.getElementById('nextBtn').disabled = paginaCorrente === DATABASE_DOMANDE.length - 1;
    }

    function initScratch(index, opt) {
        const canvas = document.getElementById(`canvas-${index}`);
        const ctx = canvas.getContext('2d');
        const parent = canvas.parentElement;
        
        canvas.width = parent.offsetWidth;
        canvas.height = parent.offsetHeight;

        if (opt.grattato) {
            document.getElementById(`feedback-${index}`).style.opacity = '1';
            return; 
        }

        ctx.fillStyle = '#bdc3c7';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = '#95a5a6';
        for(let i=0; i<100; i++) {
            ctx.beginPath();
            ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*2, 0, Math.PI*2);
            ctx.fill();
        }

        ctx.fillStyle = '#2c3e50';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('GRATTA QUI', canvas.width/2, canvas.height/2);

        document.getElementById(`feedback-${index}`).style.opacity = '1';

        let isDrawing = false;

        function getCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function scratch(e) {
            if (!isDrawing) return;
            e.preventDefault(); 
            
            opt.grattato = true;

            const pos = getCoordinates(e);
            
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 25, 0, Math.PI * 2); 
            ctx.fill();
        }

        canvas.addEventListener('mousedown', () => isDrawing = true);
        canvas.addEventListener('touchstart', (e) => { isDrawing = true; e.preventDefault(); }, {passive: false});
        
        window.addEventListener('mouseup', () => isDrawing = false);
        window.addEventListener('touchend', () => isDrawing = false);
        
        canvas.addEventListener('mousemove', scratch);
        canvas.addEventListener('touchmove', scratch, {passive: false});
    }

    function changePage(step) {
        paginaCorrente += step;
        renderQuestion();
    }

    window.addEventListener('resize', renderQuestion);
    window.onload = renderQuestion;
</script>

</body>
</html>
