<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Onde Meccaniche - Gratta e Vinci</title>
    <style>
        :root {
            --primary: #3498db;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        h1 { 
            color: #2c3e50; 
            text-align: center; 
        }

        .question-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 25px;
            color: #34495e;
        }

        .option-row {
            display: flex;
            align-items: stretch;
            margin-bottom: 15px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            overflow: hidden;
            background: white;
        }

        .visible-option {
            flex: 1;
            padding: 15px;
            display: flex;
            align-items: center;
            font-size: 1.1em;
            font-weight: bold;
            color: #2c3e50;
            border-right: 2px solid #ecf0f1;
        }

        .scratch-wrapper {
            flex: 1.5; 
            position: relative;
            min-height: 80px;
            background: #fff;
        }

        .feedback-content {
            padding: 15px;
            display: flex;
            align-items: center;
            height: 100%;
            box-sizing: border-box;
            font-weight: 500;
            line-height: 1.4;
            opacity: 0;
        }

        .correct { background-color: #d4edda; color: #155724; }
        .wrong { background-color: #f8d7da; color: #721c24; }

        .scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            touch-action: none;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
        }

        button:hover { background: #2980b9; }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        
        #pageInfo { font-weight: bold; font-size: 1.1em; color: #7f8c8d; }

        @media (max-width: 600px) {
            .option-row { flex-direction: column; }
            .visible-option { border-right: none; border-bottom: 2px solid #ecf0f1; }
            .scratch-wrapper { min-height: 100px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎯 Fisica: Onde Meccaniche</h1>
    <div id="quiz-container"></div>
    
    <div class="nav">
        <button id="prevBtn" onclick="changePage(-1)">⬅️ Precedente</button>
        <span id="pageInfo"></span>
        <button id="nextBtn" onclick="changePage(1)">Successiva ➡️</button>
    </div>
</div>

<script>
    // ==========================================
    // 1. DATABASE DOMANDE E RISPOSTE
    // ==========================================
    
    const DATABASE_DOMANDE = [
        {
            domanda: "Qual è la caratteristica fondamentale che definisce un'onda meccanica?",
            risposte: [
                { visibile: "A) Si propaga solo nel vuoto", feedback: "Errato!" },
                { visibile: "B) Trasporta materia da un punto all'altro", feedback: "Errato!" },
                { visibile: "C) Richiede un mezzo elastico per propagarsi", feedback: "Corretto!" },
                { visibile: "D) È un'onda puramente elettromagnetica", feedback: "Errato!" }
            ]
        },
        {
            domanda: "In un'onda longitudinale, le particelle del mezzo oscillano:",
            risposte: [
                { visibile: "A) Perpendicolarmente alla direzione dell'onda", feedback: "Errato!" },
                { visibile: "B) Parallelamente alla direzione dell'onda", feedback: "Corretto!" },
                { visibile: "C) In modo circolare costante", feedback: "Errato!" },
                { visibile: "D) Rimanendo completamente immobili", feedback: "Errato!" }
            ]
        },
        {
            domanda: "Se la frequenza di un'onda raddoppia (mantenendo costante la velocità), la lunghezza d'onda:",
            risposte: [
                { visibile: "A) Raddoppia", feedback: "Errato!" },
                { visibile: "B) Rimane invariata", feedback: "Errato!" },
                { visibile: "C) Diventa la metà", feedback: "Corretto!" },
                { visibile: "D) Diventa quattro volte più piccola", feedback: "Errato!" }
            ]
        },
        {
            domanda: "Il suono è un esempio tipico di:",
            risposte: [
                { visibile: "A) Onda trasversale", feedback: "Errato!"},
                { visibile: "B) Onda elettromagnetica", feedback: "Errato!" },
                { visibile: "C) Onda longitudinale", feedback: "Corretto!" },
                { visibile: "D) Onda stazionaria solo nel vuoto", feedback: "Errato!" }
            ]
        },
        {
            domanda: "In quale di questi mezzi il suono si propaga generalmente più velocemente?",
            risposte: [
                { visibile: "A) Aria a 0°C", feedback: "Errato!" },
                { visibile: "B) Acqua", feedback: "Errato!" },
                { visibile: "C) Acciaio", feedback: "Corretto!" },
                { visibile: "D) Vuoto", feedback: "Errato!" }
            ]
        },
        {
            domanda: "Cosa accade durante un'interferenza distruttiva totale tra due onde identiche?",
            risposte: [
                { visibile: "A) L'ampiezza raddoppia", feedback: "Errato!" },
                { visibile: "B) L'ampiezza risultante è nulla", feedback: "Corretto!" },
                { visibile: "C) La frequenza dell'onda aumenta", feedback: "Errato!" },
                { visibile: "D) Le onde cambiano direzione di 180°", feedback: "Errato!" }
            ]
        },
        {
            domanda: "Il periodo (T) di un'onda è definito come:",
            risposte: [
                { visibile: "A) Il numero di oscillazioni al secondo", feedback: "Errato!" },
                { visibile: "B) La distanza tra due creste successive", feedback: "Errato!" },
                { visibile: "C) Il tempo necessario per una oscillazione completa", feedback: "Corretto!" },
                { visibile: "D) La massima distanza dalla posizione di equilibrio", feedback: "Errato!" }
            ]
        },
        {
            domanda: "Il fenomeno per cui un'onda aggira un ostacolo è detto:",
            risposte: [
                { visibile: "A) Rifrazione", feedback: "Errato!" },
                { visibile: "B) Diffrazione", feedback: "Corretto!" },
                { visibile: "C) Riflessione", feedback: "Errato!" },
                { visibile: "D) Effetto Doppler", feedback: "Errato!" }
            ]
        },
        {
            domanda: "L'energia trasportata da un'onda è direttamente proporzionale al:",
            risposte: [
                { visibile: "A) Quadrato dell'ampiezza", feedback: "Corretto!" },
                { visibile: "B) Valore della lunghezza d'onda", feedback: "Errato!" },
                { visibile: "C) Mezzo di propagazione", feedback: "Errato!" },
                { visibile: "D) Solo al periodo", feedback: "Errato!" }
            ]
        },
        {
            domanda: "Quando un'onda passa da un mezzo meno denso a uno più denso (rifrazione):",
            risposte: [
                { visibile: "A) La sua frequenza cambia", feedback: "Errato!" },
                { visibile: "B) La sua velocità rimane costante", feedback: "Errato!"},
                { visibile: "C) La sua velocità e lunghezza d'onda cambiano", feedback: "Corretto!"},
                { visibile: "D) L'onda scompare sempre", feedback: "Errato!"}
            ]
        }
    ];

    // Inizializza lo stato "grattato" per ogni risposta
    DATABASE_DOMANDE.forEach(d => d.risposte.forEach(r => r.grattato = false));

    // ==========================================
    // 2. MOTORE DEL QUIZ
    // ==========================================
    let paginaCorrente = 0;

    function renderQuestion() {
        const quizContainer = document.getElementById('quiz-container');
        const d = DATABASE_DOMANDE[paginaCorrente];
        
        quizContainer.innerHTML = `
            <div class="question-card">
                <div class="question-text">${paginaCorrente + 1}. ${d.domanda}</div>
                <div id="options-list"></div>
            </div>
        `;

        const optionsList = document.getElementById('options-list');
        
        d.risposte.forEach((opt, index) => {
            const row = document.createElement('div');
            row.className = 'option-row';
            
            const isCorrect = opt.feedback.trim().startsWith("Corretto!");
            const resultClass = isCorrect ? 'correct' : 'wrong';
            const icon = isCorrect ? '🏆 ' : '❌ ';
            
            row.innerHTML = `
                <div class="visible-option">${opt.visibile}</div>
                <div class="scratch-wrapper">
                    <div id="feedback-${index}" class="feedback-content ${resultClass}">${icon}${opt.feedback}</div>
                    <canvas class="scratch-canvas" id="canvas-${index}"></canvas>
                </div>
            `;
            
            optionsList.appendChild(row);
            setTimeout(() => initScratch(index, opt), 50);
        });

        document.getElementById('pageInfo').innerText = `Domanda ${paginaCorrente + 1} di ${DATABASE_DOMANDE.length}`;
        document.getElementById('prevBtn').disabled = paginaCorrente === 0;
        document.getElementById('nextBtn').disabled = paginaCorrente === DATABASE_DOMANDE.length - 1;
    }

    function initScratch(index, opt) {
        const canvas = document.getElementById(`canvas-${index}`);
        const ctx = canvas.getContext('2d');
        const parent = canvas.parentElement;
        
        canvas.width = parent.offsetWidth;
        canvas.height = parent.offsetHeight;

        if (opt.grattato) {
            document.getElementById(`feedback-${index}`).style.opacity = '1';
            return; 
        }

        ctx.fillStyle = '#bdc3c7';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = '#95a5a6';
        for(let i=0; i<100; i++) {
            ctx.beginPath();
            ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*2, 0, Math.PI*2);
            ctx.fill();
        }

        ctx.fillStyle = '#2c3e50';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('GRATTA QUI', canvas.width/2, canvas.height/2);

        document.getElementById(`feedback-${index}`).style.opacity = '1';

        let isDrawing = false;

        function getCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function scratch(e) {
            if (!isDrawing) return;
            e.preventDefault(); 
            
            opt.grattato = true;
            const pos = getCoordinates(e);
            
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 25, 0, Math.PI * 2); 
            ctx.fill();
        }

        canvas.addEventListener('mousedown', () => isDrawing = true);
        canvas.addEventListener('touchstart', (e) => { isDrawing = true; e.preventDefault(); }, {passive: false});
        
        window.addEventListener('mouseup', () => isDrawing = false);
        window.addEventListener('touchend', () => isDrawing = false);
        
        canvas.addEventListener('mousemove', scratch);
        canvas.addEventListener('touchmove', scratch, {passive: false});
    }

    function changePage(step) {
        paginaCorrente += step;
        renderQuestion();
    }

    window.addEventListener('resize', renderQuestion);
    window.onload = renderQuestion;
</script>

</body>
</html>
